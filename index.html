<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Storm Before the Calm</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Georgia, serif;
  height: 100vh;
  overflow: hidden;
  background: black;
  color: #f0ece6;
}

/* ENTRY */
#enter {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
  cursor: pointer;
  text-align: center;
  padding: 20px;
  z-index: 10;
}

#enter h1 {
  font-size: clamp(1.6rem, 5vw, 3rem);
}

/* =========================
   VIDEO FIX (CINEMATIC CROP)
========================= */
.video-wrap {
  position: fixed;
  inset: 0;
  overflow: hidden;
  z-index: -2;
}

#bg-video {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%) scale(1.15);

  width: auto;
  height: 120%;

  opacity: 0;
  transition: opacity 1s ease;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: -1;
}

/* CONTENT */
#content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
  gap: 10px;
}

/* LINES */
.line {
  opacity: 0;
  transition: opacity 1s ease;
  font-size: clamp(1.05rem, 2.5vw, 1.6rem);
  line-height: 1.4;
}

/* BUTTONS */
#stream {
  margin-top: 20px;
  padding: 14px 28px;
  background: #c8a951;
  color: black;
  font-weight: bold;
  text-decoration: none;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 1s ease;
}

#giveaway {
  margin-top: 12px;
  font-size: 0.95rem;
  color: #aaa;
  text-decoration: underline;
  opacity: 0;
  transition: opacity 1s ease;
}

/* MOBILE */
@media (max-width: 600px) {
  .line {
    font-size: 1.05rem;
  }
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="enter">
  <h1>Enter the eye of the storm</h1>
</div>

<!-- VIDEO WRAPPER -->
<div class="video-wrap">
  <video id="bg-video" muted loop playsinline>
    <source src="WJ-Storm-Animated.mp4" type="video/mp4">
  </video>
</div>

<div class="overlay"></div>

<!-- AUDIO -->
<audio id="audio" src="storm-clip.mp3" preload="auto"></audio>

<!-- CONTENT -->
<div id="content">

  <div id="city" class="line"></div>
  <div id="weather" class="line"></div>
  <div id="state" class="line"></div>

  <a id="stream" href="https://ffm.to/stormbeforethecalm.PMT" target="_blank">
    Stream Now
  </a>

  <a id="giveaway" href="https://feature.fm/solutions/links" target="_blank">
    Enter Giveaway
  </a>

</div>

<script>

const API_KEY = "w27cjRMcrduWuPjLsmlR3wdvtZI0A9Z3";

const enter = document.getElementById("enter");
const video = document.getElementById("bg-video");
const audio = document.getElementById("audio");

const cityEl = document.getElementById("city");
const weatherEl = document.getElementById("weather");
const stateEl = document.getElementById("state");

const streamBtn = document.getElementById("stream");
const giveawayBtn = document.getElementById("giveaway");

/* ENTRY */
enter.addEventListener("click", () => {
  enter.style.display = "none";

  video.play().catch(()=>{});
  video.style.opacity = 1;

  audio.play().catch(()=>{});

  getLocation();
});

/* LOCATION */
function getLocation() {
  navigator.geolocation?.getCurrentPosition(
    pos => fetchAll(pos.coords.latitude, pos.coords.longitude),
    () => fallback()
  );
}

/* WEATHER + CITY */
async function fetchAll(lat, lon) {

  const weatherURL =
    `https://api.tomorrow.io/v4/weather/realtime?location=${lat},${lon}&apikey=${API_KEY}`;

  const geoURL =
    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;

  try {

    const [weatherRes, geoRes] = await Promise.all([
      fetch(weatherURL),
      fetch(geoURL)
    ]);

    const weather = await weatherRes.json();
    const geo = await geoRes.json();

    const v = weather?.data?.values || {};

    const tempRaw = v.temperature;
    const temp = typeof tempRaw === "number"
      ? Math.round((tempRaw * 9/5) + 32)
      : null;

    const rain = v.precipitationIntensity || 0;
    const wind = v.windSpeed || 0;

    const city =
      geo?.address?.city ||
      geo?.address?.town ||
      geo?.address?.county ||
      geo?.address?.state ||
      "your location";

    const isStorm = rain > 0.2 || wind > 15;

    cityEl.innerText = city;

    weatherEl.innerText =
      temp !== null
        ? `It's ${temp}°F and ${isStorm ? "stormy conditions" : "clear skies"} right now`
        : "Weather currently unavailable";

    stateEl.innerText =
      isStorm ? "You're in the storm." : "You're in the calm.";

    reveal();

  } catch (e) {
    fallback();
  }
}

/* FALLBACK */
function fallback() {
  cityEl.innerText = "your location";
  weatherEl.innerText = "Weather data unavailable";
  stateEl.innerText = "But it always feels like storm weather with this track.";
  reveal();
}

/* REVEAL */
function reveal() {

  cityEl.style.opacity = 1;
  weatherEl.style.opacity = 1;
  stateEl.style.opacity = 1;

  setTimeout(() => {
    streamBtn.style.opacity = 1;
  }, 1200);

  setTimeout(() => {
    giveawayBtn.style.opacity = 1;
  }, 2000);
}

</script>

</body>
</html>
